site_name: KerasFormers
site_description: Pretrained transformer models in pure Keras 3, runnable on JAX, PyTorch and TensorFlow.
site_url: https://imvision12.github.io/KerasFormers/
repo_url: https://github.com/IMvision12/KerasFormers
repo_name: IMvision12/KerasFormers
edit_uri: edit/main/docs/

# This config lives in website/, while the pages and media stay at the repo root.
docs_dir: ../docs
site_dir: ../site

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

# Figures and audio live in the repo-root assets/, outside docs/. This registers
# them with MkDocs so they are copied for `mkdocs serve` as well as `build`.
hooks:
  - hooks/copy_assets.py


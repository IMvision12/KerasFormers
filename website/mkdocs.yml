site_name: KerasFormers
site_description: Pretrained transformer models in pure Keras 3, runnable on JAX, PyTorch and TensorFlow.
site_url: https://imvision12.github.io/KerasFormers/
repo_url: https://github.com/IMvision12/KerasFormers
repo_name: IMvision12/KerasFormers
edit_uri: edit/main/docs/

# This config lives in website/, while the pages and media stay at the repo root.
docs_dir: ../docs
site_dir: ../site

theme:
  name: material
  # A blank 1x1 png, so the browser tab shows the title alone rather than
  # Material's default logo. The header logo is hidden in extra.css.
  favicon: blank.png
  features:
    # No navigation.sections: it pins the modality groups open and unclickable
    # above 1220px, and they should stay collapsible at every width.
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  # Dark navy with blue accents, the way the vLLM docs read. Dark is listed
  # first so it is the default; the toggle still offers light.
  palette:
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

# Figures, audio and the stylesheet live outside docs/. This registers them with
# MkDocs so they are copied for `mkdocs serve` as well as `build`.
hooks:
  - hooks/copy_assets.py

validation:
  nav:
    omitted_files: ignore


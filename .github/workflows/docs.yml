name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "assets/**"
      - "website/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "assets/**"
      - "website/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MkDocs
        run: pip install mkdocs-material==9.7.7

      # The site config lives in website/; docs/ and assets/ stay at the repo
      # root. website/hooks/copy_assets.py pulls the media into the build, so
      # figures and audio are handled here exactly as they are under `serve`.
      - name: Build site
        run: mkdocs build -f website/mkdocs.yml --strict

      - name: Check every image and audio reference resolves
        run: python website/scripts/check_site_assets.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Only publish from main; pull requests just build and check.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
